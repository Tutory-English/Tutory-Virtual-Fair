<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- GitHub Pages doesn't let us set real HTTP cache headers, so these meta
     tags are the standard workaround: they tell browsers not to keep an old
     cached copy of this file, so a normal refresh reliably picks up the
     latest deploy instead of silently reusing yesterday's version. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Tutory 2026 Virtual Fair — Online Test Platform</title>
<style>
  :root{
    --brand:#2f61f6;
    --brand-dark:#1d47c9;
    --brand-light:#eaf0ff;
    --bg:#f4f6fb;
    --card:#ffffff;
    --text:#1a1f36;
    --muted:#667085;
    --border:#e3e8f0;
    --danger:#e11d48;
    --danger-light:#fde8ec;
    --success:#16a34a;
    --success-light:#e8f8ee;
    --warning:#f59e0b;
    --warning-light:#fff4e0;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--text);}
  h1,h2,h3,h4{margin:0 0 8px 0;}
  p{margin:0 0 10px 0;line-height:1.55;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-weight:600;}
  input,textarea,select{font-family:inherit;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;width:100%;}
  input:focus,textarea:focus{outline:2px solid var(--brand);outline-offset:1px;}

  /* ===== Brand top bar ===== */
  #brand-bar{background:var(--brand);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:10px;}
  #brand-bar .logo{width:34px;height:34px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--brand);font-weight:800;}
  #brand-bar .title{font-weight:700;font-size:16px;}
  #brand-bar .sub{font-size:12px;opacity:.85;}

  #app{max-width:1180px;margin:0 auto;padding:24px 20px 60px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:18px;box-shadow:0 1px 2px rgba(20,25,50,.03);}
  .card-narrow{max-width:480px;margin:60px auto;}

  .landing-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:64vh;gap:36px;}
  .landing-card{max-width:480px;text-align:center;padding:52px 40px;}
  .landing-logo{width:56px;height:56px;background:var(--brand);color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;margin:0 auto 20px;}
  .landing-title{font-size:23px;margin-bottom:8px;}
  .gear-btn{position:fixed;bottom:20px;right:24px;background:none;border:none;font-size:26px;cursor:pointer;opacity:.4;transition:opacity .15s;padding:8px;line-height:1;z-index:50;}
  .gear-btn:hover{opacity:1;}

  .btn-primary{background:var(--brand);color:#fff;padding:12px 22px;font-size:14.5px;border-radius:9px;}
  .btn-primary:hover{background:var(--brand-dark);}
  .btn-primary:disabled{background:#aebdef;cursor:not-allowed;}
  .btn-secondary{background:var(--brand-light);color:var(--brand-dark);padding:10px 18px;font-size:14px;border-radius:9px;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);padding:10px 16px;font-size:13.5px;border-radius:9px;}
  .btn-danger{background:var(--danger);color:#fff;padding:10px 18px;font-size:13.5px;border-radius:9px;}
  .btn-sm{padding:6px 12px;font-size:12.5px;}
  .btn-block{width:100%;}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;}
  .pill-wait{background:var(--warning-light);color:#95610a;}
  .pill-progress{background:var(--brand-light);color:var(--brand-dark);}
  .pill-submitted{background:var(--success-light);color:var(--success);}
  .pill-auto{background:var(--danger-light);color:var(--danger);}
  .pill-pending{background:#eef0f5;color:var(--muted);}

  .dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

  .rules-list{background:var(--brand-light);border-radius:10px;padding:16px 20px;margin:12px 0;}
  .rules-list li{margin-bottom:6px;font-size:14px;}
  .donts{background:var(--danger-light);border-radius:10px;padding:16px 20px;margin:12px 0;}
  .donts li{margin-bottom:6px;font-size:14px;color:#7a1230;}
  .dos{background:var(--success-light);border-radius:10px;padding:16px 20px;margin:12px 0;}
  .dos li{margin-bottom:6px;font-size:14px;color:#0f5c30;}

  /* ===== Timer / section header ===== */
  .section-topbar{position:sticky;top:0;background:#fff;z-index:20;border:1px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 2px 6px rgba(20,25,50,.05);}
  .section-topbar .name{font-weight:700;font-size:15px;color:var(--brand-dark);}
  .timer-box{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--brand-light);color:var(--brand-dark);padding:8px 16px;border-radius:9px;font-weight:800;font-size:18px;font-variant-numeric:tabular-nums;}
  .timer-box.warn{background:var(--warning-light);color:#95610a;}
  .timer-box.grace{background:var(--danger-light);color:var(--danger);}
  .audio-banner{background:#11162b;color:#fff;padding:9px 16px;border-radius:9px;font-size:13.5px;display:flex;align-items:center;gap:8px;width:100%;}
  .grace-banner{background:var(--danger);color:#fff;padding:10px 16px;border-radius:9px;font-size:13.5px;width:100%;font-weight:600;}

  /* ===== Progress grid ===== */
  .qgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin:10px 0 18px;}
  .qgrid a{display:flex;align-items:center;justify-content:center;height:30px;border-radius:6px;background:#eef0f5;color:var(--muted);font-size:12px;font-weight:700;text-decoration:none;border:1px solid var(--border);}
  .qgrid a.answered{background:var(--brand);color:#fff;border-color:var(--brand);}
  .qgrid-sm{grid-template-columns:repeat(20,1fr);gap:4px;}
  .qgrid-sm a{height:22px;font-size:10px;border-radius:4px;}

  /* ===== Listening content (real exam-style controls) ===== */
  .part-block{margin-bottom:26px;}
  .part-title{color:var(--brand-dark);font-size:15px;margin-bottom:4px;}
  .part-instructions{font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic;}
  .inline-blank{width:130px;display:inline-block;padding:5px 8px;font-size:13px;margin:0 3px;}
  .mc-option{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13.5px;cursor:pointer;}
  .mc-option input{width:auto;margin-top:3px;}
  select.inline-select{width:190px;display:inline-block;padding:6px 8px;font-size:13px;}

  /* ===== Listening list ===== */
  .qblock{border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px;background:#fff;}
  .qblock .qnum{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--brand-light);color:var(--brand-dark);border-radius:7px;font-weight:800;font-size:12.5px;margin-right:8px;}
  .qblock .qtext{font-size:14px;color:var(--text);margin-bottom:10px;}

  /* ===== Split view (reading / writing) ===== */
  .split-view{display:flex;gap:0;align-items:stretch;}
  .panel-left{flex:1;min-width:0;max-height:calc(100vh - 320px);min-height:320px;overflow-y:auto;padding-right:22px;}
  .panel-right{flex:1;min-width:0;max-height:calc(100vh - 320px);min-height:320px;overflow-y:auto;padding-left:22px;border-left:1px solid var(--border);}
  .answer-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .answer-row .num{flex:0 0 24px;font-weight:700;font-size:12.5px;color:var(--muted);}
  .passage-text{font-size:14px;line-height:1.7;color:#333;white-space:pre-line;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
  .stat-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .stat-box .num{font-size:26px;font-weight:800;color:var(--brand-dark);}
  .stat-box .lbl{font-size:12.5px;color:var(--muted);}

  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--brand-light);color:var(--brand-dark);padding:5px 10px;border-radius:999px;font-size:12.5px;margin:3px;font-weight:600;}
  .chip button{background:none;color:var(--brand-dark);padding:0;font-size:13px;line-height:1;}

  .task-tabs{display:flex;gap:8px;margin-bottom:14px;}
  .task-tabs button{padding:9px 18px;border-radius:9px;background:#eef0f5;color:var(--muted);font-size:13.5px;}
  .task-tabs button.active{background:var(--brand);color:#fff;}
  .word-count{font-size:12.5px;color:var(--muted);margin-top:6px;text-align:right;}
  .chart-placeholder{border:1.5px dashed var(--border);border-radius:10px;padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;background:#fafbfd;margin-bottom:12px;}

  .muted{color:var(--muted);font-size:13px;}
  .center{text-align:center;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px;}
  hr{border:none;border-top:1px solid var(--border);margin:18px 0;}
  mark.hl{background:#fff3a3;padding:1px 2px;border-radius:3px;cursor:help;}
  sup.hl-num{color:var(--brand-dark);font-weight:800;font-size:11px;margin-left:1px;cursor:help;}
  .blank-num{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 3px;background:var(--brand-light);color:var(--brand-dark);border-radius:4px;font-size:10px;font-weight:800;margin-right:3px;vertical-align:middle;}

  .rubric-row{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fafbfd;}
  .rubric-narrative{font-size:13.5px;color:#333;margin:6px 0 0;line-height:1.6;}

  .score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:12px;}
  .score-box{border:1px solid var(--border);border-radius:12px;padding:16px 8px;text-align:center;}
  .score-box .band{font-size:26px;font-weight:800;color:var(--brand-dark);}
  .score-box .cefr{display:inline-block;margin-top:6px;padding:2px 10px;border:1px solid var(--border);border-radius:999px;font-size:11.5px;color:var(--muted);}
  .score-box .lbl2{font-size:12px;color:var(--muted);margin-top:8px;}
  .score-box-overall{background:var(--brand-light);border-color:var(--brand);}
  .score-box-overall .band{color:var(--brand);}

  .signature-block{margin-top:36px;}

  .report-header{display:flex;align-items:center;gap:14px;}
  .report-logo img{width:56px;height:auto;display:block;}
  .report-brand{font-size:20px;font-weight:800;color:var(--brand-dark);}
  .report-subtitle{font-size:13px;color:var(--muted);margin-top:2px;}
  .report-meta{display:flex;gap:48px;flex-wrap:wrap;margin:14px 0 4px;}
  .lbl3{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;}
  .val3{font-size:14.5px;margin-top:3px;}
  .signature-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:36px;}
  .stamp svg{width:110px;height:110px;display:block;}
  .signature-img{height:60px;width:auto;display:block;margin:0 0 6px -4px;}

  @media print{
    #demo-bar, #brand-bar, .no-print{display:none !important;}
    body{background:#fff;}
    #app{max-width:100% !important;padding:0 !important;}
    .card{border:none;box-shadow:none;padding:0;}
  }
</style>
</head>

function lRadioGroup(sec,num,options){

}

function rSelect(sec,num,options,placeholder){
  const val = sec.answers[num]||'';
  return `<select id="q-r-${num}" class="inline-select" onchange="onReadingInput(${num}, this.value)">
    <option value="">${placeholder||'Choose an answer'}</option>
    ${options.map(o=>`<option value="${o.key}" ${val===o.key?'selected':''}>${o.key} — ${esc(o.label)}</option>`).join('')}
  </select>`;
}
function rRadioGroup(sec,num,options){
  const val = sec.answers[num]||'';
  return `<div>${options.map(o=>`
    <label class="mc-option">
      <input type="radio" name="qr${num}" value="${o.key}" ${val===o.key?'checked':''} onchange="onReadingInput(${num}, this.value)">
      <span><strong>${o.key}</strong> ${esc(o.label)}</span>
    </label>`).join('')}</div>`;
}

function ensureDemoStudent(st){

let state = loadState();
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return defaultState();
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  syncFirestoreThrottled();
}

/* =========================================================
   FIRESTORE SYNC
   Local state stays the single source of truth for instant,
   lag-free UI (same as the original prototype). On top of that,
   every saveState() opportunistically pushes the current
   student's own doc (or, on the admin's screen, the student
   currently being graded) to Firestore — throttled to at most
   once every ~2.5s so typing in an essay doesn't spam writes.
   Explicit checkpoints (submit, auto-submit, sending a report)
   force an immediate sync instead of waiting for the throttle.
   ========================================================= */
let lastFsSync = 0;

/* ---- Admin: Students table search. Kept as plain DOM manipulation (not
   tied to render()) so typing never loses focus. Re-applied after every
   full render() too, since live Firestore updates re-render the table. ---- */
let studentSearchQuery = '';
function filterStudentTable(query){
  studentSearchQuery = query;
  applyStudentSearchFilter();
}
function applyStudentSearchFilter(){
  const body = document.getElementById('studentsTableBody');
  if(!body) return;
  const q = studentSearchQuery.trim().toLowerCase();
  let anyVisible = false;
  body.querySelectorAll('tr').forEach(row=>{
    const hay = row.getAttribute('data-search') || '';
    const match = !q || hay.includes(q);
    row.style.display = match ? '' : 'none';
    if(match) anyVisible = true;
  });
  const emptyMsg = document.getElementById('studentSearchEmpty');
  if(emptyMsg) emptyMsg.style.display = (q && !anyVisible) ? 'block' : 'none';
}
function syncFirestoreThrottled(){
  const now = Date.now();
  if(now - lastFsSync < 2500) return;
  lastFsSync = now;
  pushDirtyDataToFirestore();
}
function pushDirtyDataToFirestore(){
  if(state.currentStudentEmail && state.currentStudentEmail !== DEMO_EMAIL){
    const student = state.loggedInStudents[state.currentStudentEmail];
    if(student) db.collection('sessions').doc(state.currentStudentEmail).set(student).catch(e=>console.error('Sync gagal:', e));
  }
  if(state.role==='admin' && state.adminReviewingEmail && state.adminReviewingEmail !== DEMO_EMAIL){
    const student = state.loggedInStudents[state.adminReviewingEmail];
    if(student) db.collection('sessions').doc(state.adminReviewingEmail).set(student).catch(e=>console.error('Sync gagal:', e));
  }
}
function syncStudentNow(email){
  if(!email || email===DEMO_EMAIL) return;
  const student = state.loggedInStudents[email];
  if(!student) return;
  lastFsSync = Date.now();
  db.collection('sessions').doc(email).set(student).catch(e=>console.error('Sync gagal:', e));
}

/* ---- Admin dashboard + whitelist live listeners (attached after admin login) ---- */
let unsubWhitelist=null, unsubSessions=null;
let unsubTestSets=null;
function attachAdminListeners(){
  if(unsubWhitelist) return; // already attached
  unsubWhitelist = db.collection('whitelist').onSnapshot(snap=>{
    state.registeredStudents = snap.docs.map(d=>({email:d.id, name:(d.data()||{}).name||'', phone:(d.data()||{}).phone||'', setId:(d.data()||{}).setId||null}));
    render();
  }, err=>console.error('Whitelist listener error:', err));
  unsubSessions = db.collection('sessions').onSnapshot(snap=>{
    let shouldRender = false;
    snap.docChanges().forEach(change=>{
      // While the admin is actively grading this exact student, ignore
      // incoming snapshot data for them entirely. Otherwise our own
      // throttled writes (from typing notes/feedback) echo straight back
      // through this listener and force a full re-render mid-keystroke,
      // resetting the textarea's cursor and dropping characters. Local
      // in-memory state is already the freshest copy while grading is open.
      if(change.doc.id === state.adminReviewingEmail) return;
      if(change.type==='removed'){ delete state.loggedInStudents[change.doc.id]; }
      else { state.loggedInStudents[change.doc.id] = change.doc.data(); }
      shouldRender = true;
    });
    if(shouldRender) render();
  }, err=>console.error('Sessions listener error:', err));
  unsubTestSets = db.collection('testSets').onSnapshot(snap=>{
    state.testSets = snap.docs.map(d=>({id:d.id, title:(d.data()||{}).title||'', date:(d.data()||{}).date||'', status:(d.data()||{}).status||''}))
      .sort((a,b)=> (b.date||'').localeCompare(a.date||''));
    render();
  }, err=>console.error('Test sets listener error:', err));
}
function detachAdminListeners(){
  if(unsubWhitelist){ unsubWhitelist(); unsubWhitelist=null; }
  if(unsubSessions){ unsubSessions(); unsubSessions=null; }
  if(unsubTestSets){ unsubTestSets(); unsubTestSets=null; }
}

/* ---- Global "has the test started" listener — runs for every visitor,
   student or admin, from the moment the page loads ---- */
db.collection('control').doc('live').onSnapshot(snap=>{
  const data = snap.data() || {};
  state.testStarted = !!data.testStarted;
  state.testStartTime = data.testStartTime || null;
  // Back-compat: a test set that was started before this per-section-sync
  // feature existed will only have testStarted/testStartTime saved. Treat
  // that shape as "currently in Listening, started at testStartTime" so
  // nothing breaks — it heals itself the first time admin clicks Continue.
  state.currentGlobalSection = data.currentSection || (state.testStarted ? 'listening' : null);
  state.sectionStartTime = data.sectionStartTime || state.testStartTime;
  state.activeSetId = data.activeSetId || null;
  state.activeSetTitle = data.activeSetTitle || '';
  state.activeSetDate = data.activeSetDate || '';
  const st = currentStudent();
  if(st && syncStudentToGlobalSection(st)){
    syncStudentNow(st.email);
  }
  render();
}, err=>console.error('Control listener error:', err));

// If the page is reloaded while already signed in as admin, re-attach the dashboard
// listeners. If localStorage says "admin" but there's no valid Firebase session
// (e.g. it expired, or was signed out from another tab), bounce back to student view
// instead of showing an empty, non-functional dashboard.
auth.onAuthStateChanged(user=>{
  if(user && user.email===ADMIN_EMAIL){
    if(state.role==='admin') attachAdminListeners();
  }else if(state.role==='admin'){
    state.role = 'student';
    saveState();
    render();
  }
});

/* =========================================================
   HELPERS
   ========================================================= */
function formatTime(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60).toString().padStart(2,'0');
  const s = (sec%60).toString().padStart(2,'0');
  return m+':'+s;
}
function esc(str){
  const d = document.createElement('div'); d.textContent = str==null?'':str; return d.innerHTML;
}
function getStudent(email){ return state.loggedInStudents[email]; }
function currentStudent(){ return state.currentStudentEmail ? getStudent(state.currentStudentEmail) : null; }

function sectionRemaining(student, key){
  const sec = student.sections[key];
  if(!sec.startTime) return SECTION_DURATION[key];
  const elapsed = (Date.now()-sec.startTime)/1000;
  return SECTION_DURATION[key]-elapsed;
}
// Seconds left until the admin's "Continue to Next Skill" unlocks for the
// currently active global section (only meaningful for the admin dashboard —
// this is a separate, longer clock than what students see for their own
// section, see ADMIN_SECTION_DURATION).
function adminSectionCountdownRemaining(){
  if(!state.currentGlobalSection || state.currentGlobalSection==='completed' || !state.sectionStartTime) return 0;
  const dur = ADMIN_SECTION_DURATION[state.currentGlobalSection];
  if(dur==null) return 0;
  const elapsed = (Date.now()-state.sectionStartTime)/1000;
  return dur - elapsed;
}

function statusBadge(status){
  const map = {
    pending:['pill-pending','Not started'],
    in_progress:['pill-progress','In progress'],
    submitted:['pill-submitted','Submitted'],
    auto_submitted:['pill-auto','Auto-submitted']
  };
  const [cls,label] = map[status] || map.pending;
  return `<span class="pill ${cls}">${label}</span>`;
}

/* =========================================================
   TRANSITIONS (state mutations that require full render)
   ========================================================= */
async function loginStudent(email){
  email = (email||'').trim().toLowerCase();
  if(!email){ alert('Please enter your email first.'); return; }
  if(!state.activeSetId){
    alert("There's no open test session right now. Please check with the admin.");
    return;
  }
  state.loginChecking = true;
  state.loginNotRegistered = false;
  state.loginWrongSet = false;
  render();
  let wDoc;
  try{
    wDoc = await db.collection('whitelist').doc(email).get();
  }catch(err){
    console.error(err);
    state.loginChecking = false;
    render();
    alert('Failed to connect to the server. Check your internet connection and try again.');
    return;
  }
  const wData = wDoc.exists ? (wDoc.data()||{}) : null;
  if(!wDoc.exists || wData.setId !== state.activeSetId){
    state.currentStudentEmail = null;
    state.loginAttemptEmail = email;
    state.loginNotRegistered = !wDoc.exists;
    state.loginWrongSet = wDoc.exists && wData.setId !== state.activeSetId;
    state.loginChecking = false;
    render();
    return;
  }
  const name = wData.name || email;
  try{
    const sDoc = await db.collection('sessions').doc(email).get();
    let student;
    if(sDoc.exists && sDoc.data().setId === state.activeSetId){
      student = sDoc.data(); // rejoin: resume existing progress (same or different device)
    }else{
      student = newStudent(email, name, wData.phone||'');
      student.setId = state.activeSetId;
      student.setTitle = state.activeSetTitle;
      student.setDate = state.activeSetDate;
      await db.collection('sessions').doc(email).set(student);
    }
    state.loggedInStudents[email] = student;
    state.currentStudentEmail = email;
    // if the exam is already underway, drop the student straight into
    // whichever section the room is currently on (not always Listening —
    // could be Reading or Writing if they're joining late)
    syncStudentToGlobalSection(student);
    state.loginChecking = false;
    saveState();
    syncStudentNow(email);
    render();
  }catch(err){
    console.error(err);
    state.loginChecking = false;
    render();
    alert('Failed to connect to the server. Check your internet connection and try again.');
  }
}

function logoutStudent(){
  state.currentStudentEmail = null;
  state.loginNotRegistered = false;
  saveState();
  render();
}

function beginSection(student, key, startTime){
  student.currentSection = key;
  student.sections[key].status = 'in_progress';
  // Every section is now synced to the admin's global clock (not each
  // student's own login/arrival moment) — late joiners pick up wherever
  // the room has actually gotten to, same as Listening always did, since
  // the whole exam now advances section-by-section only when the admin
  // clicks "Continue to Next Skill".
  student.sections[key].startTime = startTime || Date.now();
}

// Keeps one student's local section in lockstep with the admin's global
// currentSection/sectionStartTime. Used on login, on every control/live
// update, and defensively on render. Returns true if it changed anything
// (so callers know whether to persist/sync).
function syncStudentToGlobalSection(student){
  if(!student || !state.currentGlobalSection) return false;
  if(student.currentSection === state.currentGlobalSection) return false;
  // Whatever section they're being moved out of, if it was still showing
  // "in_progress" (their own device never got a chance to auto-lock it —
  // e.g. screen was off/backgrounded and its own timer never fired), lock
  // it now as auto-submitted. Otherwise it would be left dangling at
  // "in_progress" forever, which breaks allSectionsDone()/grading even
  // though the student has already moved on.
  const leaving = student.currentSection;
  if(SECTION_ORDER.includes(leaving) && student.sections[leaving].status==='in_progress'){
    student.sections[leaving].status = 'auto_submitted';
    student.sections[leaving].autoSubmitted = true;
    student.sections[leaving].submittedAt = Date.now();
  }
  if(state.currentGlobalSection === 'completed'){
    student.currentSection = 'completed';
  }else{
    beginSection(student, state.currentGlobalSection, state.sectionStartTime);
  }
  return true;
}

// Submitting early just locks that section's answers and parks the student
// on the "waiting for the admin" screen (see isWaitingForAdmin) — moving to
// the next section only happens once the admin clicks "Continue to Next
// Skill" for the whole room, via syncStudentToGlobalSection above.
function submitSection(section){
  const student = currentStudent();
  if(!student) return;
  if(!confirm(`Submit your ${SECTION_LABEL[section]} answers now? You won't be able to change your ${SECTION_LABEL[section]} answers after this.`)) return;
  student.sections[section].status = 'submitted';
  student.sections[section].submittedAt = Date.now();
  saveState();
  syncStudentNow(student.email);
  render();
}

// Time ran out for this student's current section — lock their answers
// immediately (no extra grace window to keep typing). They stay parked on
// the "waiting for admin" screen until the admin continues everyone on.
function autoSubmitSection(student, key){
  student.sections[key].status = 'auto_submitted';
  student.sections[key].autoSubmitted = true;
  student.sections[key].submittedAt = Date.now();
}

// True while a student is done with their current section (submitted, or
// auto-locked because time ran out) but the admin hasn't moved the room on
// to the next section yet.
function isWaitingForAdmin(student){
  const key = student.currentSection;
  if(!SECTION_ORDER.includes(key)) return false;
  const status = student.sections[key].status;
  return status==='submitted' || status==='auto_submitted';
}

/* ---- Admin actions ---- */
async function adminStartTest(){
  if(state.testStarted) return;
  if(!state.activeSetId){ alert('Select (or create) an active Test Set first — see the "Test Sets" card above.'); return; }
  if(!confirm('Start the test now for all students who are logged in?')) return;
  try{
    const now = Date.now();
    await db.collection('control').doc('live').set({
      testStarted:true,
      testStartTime: now,
      currentSection: 'listening',
      sectionStartTime: now
    }, {merge:true});
    // no local mutation needed here — every student's own device picks this
    // up instantly via the live control listener and transitions itself.
  }catch(err){
    console.error(err);
    alert('Failed to start the test. Check your internet connection and try again.');
  }
}

// Called from the admin dashboard once the current section's admin-facing
// countdown (ADMIN_SECTION_DURATION) has reached zero. Moves the whole room
// on to the next section together — every logged-in student's own device
// picks this up via the control/live listener and syncs itself, regardless
// of whether that student had already submitted early or gotten auto-locked
// when their own (shorter) timer ran out.
// `force` skips the admin-buffer wait entirely — for real-world situations
// where the admin needs to move the room on right now regardless of the
// countdown (e.g. everyone visibly finished early, or the buffer just isn't
// needed today). Without force, this refuses to run until the countdown
// hits 00:00.
async function adminContinueToNextSection(force){
  if(!state.currentGlobalSection || state.currentGlobalSection==='completed') return;
  if(!force && adminSectionCountdownRemaining() > 0){
    alert(`Please wait until the ${SECTION_LABEL[state.currentGlobalSection]} timer reaches 00:00 before continuing (or use "Continue now anyway" to skip the wait).`);
    return;
  }
  const next = nextGlobalSection(state.currentGlobalSection);
  const actionLabel = next==='completed' ? 'finish the test for everyone' : `move everyone on to ${SECTION_LABEL[next]}`;
  const confirmMsg = force
    ? `Skip the remaining wait and ${actionLabel} right now? Any student still mid-answer will be locked out immediately.`
    : `Continue and ${actionLabel} now?`;
  if(!confirm(confirmMsg)) return;
  try{
    await db.collection('control').doc('live').set({
      currentSection: next,
      sectionStartTime: next==='completed' ? null : Date.now()
    }, {merge:true});
  }catch(err){
    console.error(err);
    alert('Failed to continue to the next section. Check your internet connection and try again.');
  }
}

// Which registered students in the active set are still behind the current
// global section? Happens when a student's own device is asleep/backgrounded
// and never gets to process a control/live update on its own — their answers
// are still being saved as they type, but their status can be stuck at
// "in_progress" until that device reconnects. This finds them for
// adminForceLockStragglers below.
function getStragglers(){
  // Also applies once the exam is fully finished (currentGlobalSection ===
  // 'completed') — students whose own device never got a chance to process
  // that final transition (e.g. it was asleep) need to be caught up here
  // too, otherwise "Completed test" stays stuck at 0 even though the test
  // is genuinely over.
  if(!state.currentGlobalSection) return [];
  return Object.values(state.loggedInStudents).filter(s=>
    s.setId===state.activeSetId && s.currentSection!==state.currentGlobalSection
  );
}
// Directly catches up any straggling students to the current section from
// the admin side, instead of waiting for their own device to reconnect and
// do it itself. Their answers so far are untouched — only the status of
// whatever section they were stuck on gets locked (auto-submitted), same as
// if their own device had done it. Safe to run any time; students already
// caught up are simply skipped.
async function adminForceLockStragglers(){
  const stragglers = getStragglers();
  if(stragglers.length===0){ alert('Everyone is already caught up to the current section.'); return; }
  const label = state.currentGlobalSection==='completed' ? 'finished' : SECTION_LABEL[state.currentGlobalSection];
  if(!confirm(`${stragglers.length} student(s) are still behind (likely their device is asleep/offline). Lock their answers so far and mark them as ${label} right now?`)) return;
  try{
    const batch = db.batch();
    stragglers.forEach(s=>{
      syncStudentToGlobalSection(s);
      batch.set(db.collection('sessions').doc(s.email), s);
    });
    await batch.commit();
    render();
  }catch(err){
    console.error(err);
    alert('Failed to catch up stragglers. Check your internet connection and try again.');
  }
}

/* ---- Test Sets: named, dated batches. Only one is "active" at a time —
   whichever set is active is the one students can log into, the one new
   registrations/imports get tagged with, and the one shown on reports. ---- */
async function adminCreateTestSet(){
  const titleInput = document.getElementById('setTitleInput');
  const dateInput = document.getElementById('setDateInput');
  const title = titleInput.value.trim();
  const date = dateInput.value;
  if(!title){ alert('Give this test set a name first, e.g. "Tutory Virtual Fair — 11 July 2026".'); return; }
  try{
    const ref = await db.collection('testSets').add({
      title, date,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    titleInput.value = '';
    dateInput.value = '';
    if(!state.activeSetId){
      // first set ever created — make it active automatically so admins
      // don't have to remember an extra click
      await adminSetActiveSet(ref.id, title, date, true);
    }
  }catch(err){
    console.error(err);
    alert('Failed to create the test set. Check your internet connection and try again.');
  }
}
// Switches which set's students/results the dashboard displays, WITHOUT
// making it the live active set — lets the admin browse a past or upcoming
// set's data (e.g. to re-check a report) without kicking anyone out or
// resetting test-start status. Purely local to this admin's own browser.
function adminViewTestSet(setId){
  state.viewingSetId = setId;
  render();
}
function adminClearSetView(){
  state.viewingSetId = null;
  render();
}
async function adminSetActiveSet(setId, title, date, skipConfirm){
  if(setId === state.activeSetId) return;
  if(!skipConfirm && !confirm(`Make "${title}" the active test set?\n\nStudents will only be able to log in if they were registered under this set. The test-start status resets to "not started" for the new set.`)) return;
  state.viewingSetId = null; // follow the newly active set instead of whatever was being browsed
  try{
    await Promise.all([
      db.collection('control').doc('live').set({
        activeSetId: setId,
        activeSetTitle: title,
        activeSetDate: date || '',
        testStarted: false,
        testStartTime: null,
        currentSection: null,
        sectionStartTime: null
      }, {merge:true}),
      // Activating a set that was previously marked "Done" un-marks it —
      // a set can't be both Done and Active at the same time. Safe to run
      // even if the set was never marked done (field just doesn't exist).
      db.collection('testSets').doc(setId).set({status: firebase.firestore.FieldValue.delete()}, {merge:true})
    ]);
  }catch(err){
    console.error(err);
    alert('Failed to switch the active test set. Check your internet connection and try again.');
  }
}
// Marks a set as finished. Keeps all its data (students, results, reports)
// intact for later reference, but takes it out of the active rotation so
// nobody accidentally logs in for a session that's already over.
async function adminMarkSetDone(setId){
  try{
    await db.collection('testSets').doc(setId).set({status:'done'}, {merge:true});
    if(state.activeSetId === setId){
      await db.collection('control').doc('live').set({
        activeSetId: null, activeSetTitle:'', activeSetDate:'',
        testStarted:false, testStartTime:null,
        currentSection:null, sectionStartTime:null
      }, {merge:true});
    }
  }catch(err){
    console.error(err);
    alert('Failed to mark the test set as done. Check your internet connection and try again.');
  }
}
// Permanently deletes a test set: the set itself, every student registered
// under it (whitelist), and every saved result (sessions). Cannot be undone.
async function adminDeleteTestSet(setId, title){
  if(!confirm(`Delete "${title}"?\n\nThis will permanently remove this test set AND every registered student and saved result under it. This cannot be undone.`)) return;
  try{
    const [wlSnap, sessSnap] = await Promise.all([
      db.collection('whitelist').where('setId','==',setId).get(),
      db.collection('sessions').where('setId','==',setId).get()
    ]);
    const batch = db.batch();
    wlSnap.docs.forEach(d=>batch.delete(d.ref));
    sessSnap.docs.forEach(d=>batch.delete(d.ref));
    batch.delete(db.collection('testSets').doc(setId));
    await batch.commit();
    if(state.activeSetId === setId){
      await db.collection('control').doc('live').set({
        activeSetId: null, activeSetTitle:'', activeSetDate:'',
        testStarted:false, testStartTime:null,
        currentSection:null, sectionStartTime:null
      }, {merge:true});
    }
  }catch(err){
    console.error(err);
    alert('Failed to delete the test set. Check your internet connection and try again.');
  }
}

/* ---- Bulk import: paste rows copied straight out of a spreadsheet.
   Handles tab-separated (Excel/Sheets paste) or comma-separated (CSV paste)
   lines with any number/order of extra columns — it just looks for the one
   field that's a valid email, and the best-looking name among the rest. ---- */
/* ---- Bulk import: read an uploaded .csv/.xlsx/.xls file and drop its
   contents into the paste textarea, so it goes through the exact same
   parsing + import path as a manual paste. ---- */
async function handleBulkImportFile(file){
  if(!file) return;
  const lower = file.name.toLowerCase();
  const textarea = document.getElementById('bulkImportText');
  try{
    let text;
    if(lower.endsWith('.csv')){
      text = await file.text();
    }else if(lower.endsWith('.xlsx') || lower.endsWith('.xls')){
      if(typeof XLSX === 'undefined'){
        alert('The Excel-reading library failed to load. Check your internet connection and try again, or save the file as .csv instead.');
        return;
      }
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      text = XLSX.utils.sheet_to_csv(sheet);
    }else{
      alert('Please upload a .csv, .xlsx, or .xls file.');
      return;
    }
    textarea.value = text;
  }catch(err){
    console.error(err);
    alert("Couldn't read that file. Please make sure it's a valid CSV or Excel file.");
  }
}
function parseBulkImportText(raw){
  // Finds an email ANYWHERE in the line rather than requiring a specific
  // delimiter — handles tab-separated (Excel/Sheets paste), comma-separated
  // (CSV paste), or plain multi-space-aligned paste equally well.
  const emailSearchRe = /[^\s,;\t]+@[^\s,;\t]+\.[^\s,;\t]+/;
  const phoneRe = /^[+\d][\d\s-]{5,}$/;
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const rows = [];
  for(const line of lines){
    const match = line.match(emailSearchRe);
    if(!match) continue; // skip lines with no email — e.g. a header row
    const email = match[0].toLowerCase().replace(/[.,;]+$/,'');
    // whatever's left on the line, once the email itself is removed
    let rest = (line.slice(0, match.index) + ' ' + line.slice(match.index + match[0].length));
    const tokens = rest
      .split(/[\t,;]+|\s{2,}/) // split on tabs/commas/semicolons or runs of 2+ spaces
      .map(p=>p.trim())
      .filter(p=>p.length>0 && !/^\d+[.)]?$/.test(p)); // drop a leading row number ("1", "1.", "1)")
    // a WhatsApp/phone number column, if present, is captured separately
    const phoneToken = tokens.find(p=>phoneRe.test(p));
    const phone = phoneToken ? phoneToken.replace(/[\s-]/g,'') : '';
    const nameTokens = tokens.filter(p=>/[a-zA-Z]/.test(p) && !phoneRe.test(p));
    const name = nameTokens.sort((a,b)=>b.length-a.length)[0] || email;
    rows.push({name, email, phone});
  }
  return rows;
}
async function adminBulkImport(){
  if(!state.activeSetId){ alert('Select (or create) an active Test Set first — see the "Test Sets" card above.'); return; }
  const textarea = document.getElementById('bulkImportText');
  const rows = parseBulkImportText(textarea.value);
  if(rows.length===0){
    alert("Couldn't find any valid email addresses in the pasted text. Paste one student per line, with their name and email included.");
    return;
  }
  if(!confirm(`Import ${rows.length} student(s) into "${state.activeSetTitle}"? Emails already registered for this set will be skipped.`)) return;
  const btn = document.getElementById('bulkImportBtn');
  if(btn) btn.disabled = true;
  let added = 0, skipped = 0, failed = 0;
  for(const {name, email, phone} of rows){
    try{
      const ref = db.collection('whitelist').doc(email);
      const existing = await ref.get();
      if(existing.exists && (existing.data()||{}).setId === state.activeSetId){ skipped++; continue; }
      await ref.set({name, phone: phone||'', setId: state.activeSetId, addedAt: firebase.firestore.FieldValue.serverTimestamp()});
      added++;
    }catch(err){
      console.error('Bulk import failed for', email, err);
      failed++;
    }
  }
  if(btn) btn.disabled = false;
  textarea.value = '';
  alert(`Import complete.\n\nAdded: ${added}\nAlready registered for this set (skipped): ${skipped}\nFailed: ${failed}`);
}

/* =========================================================
   TICK — runs every second, only patches live text, and
   auto-locks a student's answers the instant their own section
   timer hits 0 (no extra grace window to keep typing).
   ========================================================= */
let lastTestStartedFlag = state.testStarted;

function tick(){
  // 1) sweep the CURRENT device's own student for auto-lock.
  //    (Only the student's own tab does this now — not the admin dashboard —
  //    so two devices can't race to auto-submit the same student twice.)
  let needsFullRender = false;
  if(state.role==='student'){
    const st = currentStudent();
    if(st){
      const sec = st.currentSection;
      if(SECTION_ORDER.includes(sec) && st.sections[sec].status==='in_progress'){
        if(sectionRemaining(st, sec) <= 0){
          autoSubmitSection(st, sec);
          needsFullRender = true;
          syncStudentNow(st.email);
        }
      }
    }
  }

  // 2) waiting-room auto-transition detection
  if(state.testStarted !== lastTestStartedFlag){
    lastTestStartedFlag = state.testStarted;
    needsFullRender = true;
  }

  if(needsFullRender){
    saveState();
    render();
    return;
  }

  saveState();
  patchLiveTimers();
}

function patchLiveTimers(){
  // student-facing timer (only while actually working the section — once
  // it flips to "waiting for admin" this element no longer exists, tick()
  // will have already triggered a full render for that transition anyway)
  const student = currentStudent();
  if(state.role==='student' && student && SECTION_ORDER.includes(student.currentSection) && !isWaitingForAdmin(student)){
    const key = student.currentSection;
    const remaining = sectionRemaining(student, key);
    const box = document.getElementById('liveTimer');
    if(box){
      box.textContent = '⏱ ' + formatTime(Math.max(0,remaining));
      box.className = 'timer-box' + (remaining<=0 ? ' grace' : (remaining < 300 ? ' warn' : ''));
    }
  }
  // waiting room dot already CSS-animated, no patch needed

  // admin per-row timers + the current section's countdown/Continue button
  if(state.role==='admin'){
    Object.values(state.loggedInStudents).forEach(st=>{
      SECTION_ORDER.forEach(key=>{
        const el = document.getElementById('rem-'+key+'-'+st.email);
        if(el && st.sections[key].status==='in_progress'){
          el.textContent = formatTime(Math.max(0,sectionRemaining(st,key)));
        }
      });
    });
    const cd = document.getElementById('adminSectionCountdown');
    if(cd && state.testStarted && state.currentGlobalSection && state.currentGlobalSection!=='completed'){
      const rem = adminSectionCountdownRemaining();
      cd.textContent = formatTime(Math.max(0,rem));
      const btn = document.getElementById('continueBtn');
      if(btn) btn.disabled = rem>0;
      const forceWrap = document.getElementById('forceContinueWrap');
      if(forceWrap) forceWrap.style.display = rem>0 ? 'block' : 'none';
    }
  }
}

setInterval(tick, 1000);

function renderStudentFlow(){
  if(!state.landingDismissed) return renderLanding();
  const student = currentStudent();
  if(!student) return renderLogin();
  if(syncStudentToGlobalSection(student)){
    saveState();
  }
  switch(student.currentSection){
    case 'waiting': return renderWaitingRoom(student);
    case 'listening': return isWaitingForAdmin(student) ? renderWaitingForAdmin(student,'listening') : renderListening(student);
    case 'reading': return isWaitingForAdmin(student) ? renderWaitingForAdmin(student,'reading') : renderReading(student);
    case 'writing': return isWaitingForAdmin(student) ? renderWaitingForAdmin(student,'writing') : renderWriting(student);
    case 'completed': return renderCompleted(student);
    default: return renderWaitingRoom(student);
  }
}

const LISTENING_ANSWER_KEY = {
  1:['10','ten'], 2:['weather'], 3:['safety'], 4:['discount'], 5:['dictionary'],
  6:['certificate'], 7:['towel'], 8:['cafe','café'], 9:['videos'], 10:['lockers'],
  11:['A'], 12:['B'], 13:['A'], 14:['A'], 15:['A'], 16:['C'], 17:['C'], 18:['A'], 19:['B'], 20:['C'],
  25:['G'], 26:['B'], 27:['F'], 28:['H'], 29:['A'], 30:['E'],
  31:['metal','metals'], 32:['slow'], 33:['demand'], 34:['equator'], 35:['recycle'],
  36:['fungus'], 37:['weather'], 38:['strong'], 39:['roots'], 40:['soil']
};
const LISTENING_GROUPS = [ {nums:[21,22], set:['B','D']}, {nums:[23,24], set:['C','E']} ];

const READING_ANSWER_KEY = {
  1:['E'],2:['F'],3:['D'],4:['B'],5:['C'],6:['E'],7:['F'],8:['A'],9:['E'],10:['F'],11:['B'],12:['C'],13:['D'],
  14:['iii'],15:['i'],16:['v'],17:['iv'],18:['ii'],19:['vi'],20:['D'],21:['C'],22:['A'],23:['B'],24:['B'],25:['A'],26:['D'],
  27:['B'],28:['B'],29:['A'],30:['C'],31:['YES'],32:['NO'],33:['NOT GIVEN'],34:['NO'],35:['YES'],36:['D'],37:['B'],38:['I'],39:['E'],40:['G']
};

function gradeListening(sec){
  let correct = 0;
  for(let n=1;n<=40;n++){
    if([21,22,23,24].includes(n)) continue;
    const key = LISTENING_ANSWER_KEY[n];
    if(!key) continue;
    const given = (sec.answers[n]||'').toString().trim().toLowerCase();
    if(given && key.some(k=>k.toLowerCase()===given)) correct++;
  }
  LISTENING_GROUPS.forEach(g=>{
    const keyLeft = g.set.slice();
    g.nums.forEach(n=>{
      const given = (sec.answers[n]||'').toString().trim().toUpperCase();
      const idx = keyLeft.indexOf(given);
      if(given && idx>-1){ correct++; keyLeft.splice(idx,1); }
    });
  });
  return {correct, total:40};
}
function gradeReading(sec){
  let correct = 0;
  for(let n=1;n<=40;n++){
    const key = READING_ANSWER_KEY[n];
    if(!key) continue;
    const given = (sec.answers[n]||'').toString().trim().toUpperCase();
    if(given && key.some(k=>k.toUpperCase()===given)) correct++;
  }
  return {correct, total:40};
}
function listeningWrongDetails(sec){
  const wrong = [];
  for(let n=1;n<=40;n++){
    if([21,22,23,24].includes(n)) continue;
    const key = LISTENING_ANSWER_KEY[n];
    if(!key) continue;
    const given = (sec.answers[n]||'').toString().trim();
    const isCorrect = given && key.some(k=>k.toLowerCase()===given.toLowerCase());
    if(!isCorrect) wrong.push({num:n, given: given || '(no answer)', correct:key[0]});
  }
  LISTENING_GROUPS.forEach(g=>{
    g.nums.forEach(n=>{
      const given = (sec.answers[n]||'').toString().trim();
      if(!g.set.includes(given.toUpperCase())) wrong.push({num:n, given: given || '(no answer)', correct:g.set.join(' or ')});
    });
  });
  wrong.sort((a,b)=>a.num-b.num);
  return wrong;
}
function readingWrongDetails(sec){
  const wrong = [];
  for(let n=1;n<=40;n++){
    const key = READING_ANSWER_KEY[n];
    if(!key) continue;
    const given = (sec.answers[n]||'').toString().trim();
    const isCorrect = given && key.some(k=>k.toUpperCase()===given.toUpperCase());
    if(!isCorrect) wrong.push({num:n, given: given || '(no answer)', correct:key[0]});
  }
  return wrong;
}

/* Raw-score-to-band conversion table (as provided by Sheren). */
function rawScoreToBand(correct){
  const table = [
    [39,9],[37,8.5],[35,8],[33,7.5],[30,7],[27,6.5],[23,6],[19,5.5],
    [15,5],[13,4.5],[10,4],[8,3.5],[6,3],[4,2.5],[2,2]
  ];
  for(const [min,band] of table){ if(correct>=min) return band; }
  return 1;
}
/* Approximate IELTS-to-CEFR equivalence (commonly published reference, indicative only). */
function cefrFromBand(band){
  if(band===null || band===undefined) return '—';
  if(band>=8.5) return 'C2';
  if(band>=7) return 'C1';
  if(band>=5.5) return 'B2';
  if(band>=4) return 'B1';
  if(band>=3) return 'A2';
  return 'A1';
}
/* Official IELTS overall-band rounding: x.00–x.24→x.0, x.25–x.74→x.5, x.75–x.99→(x+1).0 */
function roundToHalfBand(avg){
  return Math.round(avg*2)/2;
}

function bandOptionsHTML(criterion, current){
  const bands = [9,8,7,6,5,4];
  return `<option value="">Choose band</option>` + bands.map(b=>
    `<option value="${b}" ${String(current)===String(b)?'selected':''}>Band ${b}</option>`
  ).join('');
}
function criterionNarrative(criterion, band){
  if(band===null || band===undefined || band==='') return null;
  const b = Number(band);
  const cur = criterion.bands[b];
  if(!cur) return null;
  if(b>=9) return {have:cur.have, grow:null};
  return {have:cur.have, grow:cur.grow};
}
function computeTaskBand(criteriaScores){
  const vals = Object.values(criteriaScores).filter(v=>v!==null && v!=='' && v!==undefined).map(Number);
  if(vals.length===0) return null;
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  return roundToHalfBand(avg);
}
function computeOverallWritingBand(t1,t2){
  const b1 = computeTaskBand(t1), b2 = computeTaskBand(t2);
  if(b1===null && b2===null) return null;
  const w1 = b1===null?0:b1, w2 = b2===null?0:b2;
  const denom = (b1===null?0:1) + (b2===null?0:2);
  if(denom===0) return null;
  return roundToHalfBand((w1*(b1===null?0:1) + w2*(b2===null?0:2)) / denom);
}
function computeSpeakingBand(criteriaScores){
  return computeTaskBand(criteriaScores);
}
function computeOverallScore(lBand, rBand, wBand, sBand){
  if([lBand,rBand,wBand,sBand].some(v=>v===null || v===undefined)) return null;
  return roundToHalfBand((lBand+rBand+wBand+sBand)/4);
}

function ensureGrading(student){
  if(!('phone' in student)) student.phone = '';
  if(!student.grading){
    student.grading = {
      writing:{
        comments:{task1:[], task2:[]},
        criteria:{task1:{TR:'',CC:'',LR:'',GRA:''}, task2:{TR:'',CC:'',LR:'',GRA:''}}
      },
      speaking:{ criteria:{FC:'',LR:'',GRA:'',PRON:''} },
      notes:'',
      writingComment:'',
      reportSent:false,
      reportSentAt:null,
      locked:false,
      listeningOverride:null,
      readingOverride:null,
      listeningComment:'',
      readingComment:'',
      speakingComment:''
    };
    return;
  }
  // Backfill fields added after this student's grading object was first
  // created (e.g. from earlier today), so older/in-progress sessions don't
  // silently miss newer functionality like manual band overrides/comments.
  if(!('listeningOverride' in student.grading)) student.grading.listeningOverride = null;
  if(!('readingOverride' in student.grading)) student.grading.readingOverride = null;

}

/* =========================================================

function buildHighlightedHTML(rawText, comments){
  if(!rawText || !rawText.trim()) return '<span class="muted">(not answered yet)</span>';
  let matches = [];
  comments.forEach((c,i)=>{
    const idx = rawText.indexOf(c.quote);
    if(idx>-1) matches.push({start:idx, end:idx+c.quote.length, idx:i});
  });
  matches.sort((a,b)=>a.start-b.start);
  let filtered = [], lastEnd = -1;
  matches.forEach(m=>{ if(m.start>=lastEnd){ filtered.push(m); lastEnd = m.end; } });
  let html = '', cursor = 0;
  filtered.forEach(m=>{
    html += esc(rawText.slice(cursor, m.start));
    html += `<mark class="hl" title="Comment #${m.idx+1}: ${esc(comments[m.idx].comment)}">${esc(rawText.slice(m.start, m.end))}</mark><sup class="hl-num">(${m.idx+1})</sup>`;
    cursor = m.end;
  });
  html += esc(rawText.slice(cursor));
  return html;
}

function addWritingComment(task){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  const sel = window.getSelection().toString().trim();
  if(!sel){ alert("Please select (highlight) part of the student's answer first, then click this button."); return; }
  const commentText = prompt('Comment for the selected text:\n"'+sel+'"');
  if(commentText===null || commentText.trim()==='') return;
  student.grading.writing.comments[task].push({quote:sel, comment:commentText.trim()});
  saveState();
  render();
}
function removeWritingComment(task, idx){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  student.grading.writing.comments[task].splice(idx,1);
  saveState();
  render();
}

  const student = getStudent(state.adminReviewingEmail);

}
function setSpeakingCriteria(key, value){

// Manual band overrides for Listening/Reading — for cases where the
// recorded answers are known to be incomplete or missing (e.g. a technical
// issue during the test) and the auto-computed score from those answers
// wouldn't be a fair reflection of the student's actual performance. Leave
// as "Auto" to keep using the normal answer-key-based score.
function setListeningOverride(value){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  student.grading.listeningOverride = value===''? null : Number(value);
  saveState();
  render();
}
function setReadingOverride(value){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  student.grading.readingOverride = value===''? null : Number(value);
  saveState();
  render();
}
function bandOverrideOptionsHTML(value){
  let opts = `<option value="" ${value==null?'selected':''}>Auto (from answers)</option>`;
  for(let b=9;b>=1;b-=0.5){
    opts += `<option value="${b}" ${value===b?'selected':''}>Band ${b}</option>`;
  }
  return opts;
}

// Lets the teacher type/paste the student's essay in manually during review
// (e.g. when the recorded answer is missing due to a technical issue). Saves
// straight into the same field the student's own typing would have filled,
// then live-updates the highlighted preview below without a full re-render
// (so the textarea doesn't lose focus on every keystroke).
function setManualWritingText(task, value){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  student.sections.writing.answers[task] = value;
  saveState();
  const preview = document.getElementById('writingText-'+task);
  if(preview) preview.innerHTML = buildHighlightedHTML(value, student.grading.writing.comments[task]);
}
function setStudentPhone(value){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  student.phone = value;
  saveState();
}
// Turns whatever the admin typed into the WhatsApp Number field into the
// digits-only, country-code-first format wa.me needs (e.g. "0812-345-678"
// -> "62812345678"). Assumes a leading 0 means an Indonesian local number.
function sanitizePhoneForWA(phone){
  let digits = (phone||'').replace(/[^\d]/g,'');
  if(digits.startsWith('0')) digits = '62' + digits.slice(1);
  return digits;
}
// Builds the plain-text WhatsApp message: a summary of all four band scores
// plus the overall score, each skill's overall comment, and the teacher's
// notes — no per-question or per-criterion detail.
function buildReportWAText(student){
  const g = student.grading;
  const lGrade = gradeListening(student.sections.listening);
  const rGrade = gradeReading(student.sections.reading);
  const lBand = rawScoreToBand(lGrade.correct);
  const rBand = rawScoreToBand(rGrade.correct);
  const effLBand = g.listeningOverride!=null ? g.listeningOverride : lBand;
  const effRBand = g.readingOverride!=null ? g.readingOverride : rBand;
  const wOverall = computeOverallWritingBand(g.writing.criteria.task1, g.writing.criteria.task2);
  const sBand = computeSpeakingBand(g.speaking.criteria);
  const overallScore = computeOverallScore(effLBand, effRBand, wOverall, sBand);
  const dateSource = student.sections.listening.startTime || student.loginTime;
  const dateTaken = new Date(dateSource).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const fmt = (b)=> (b===null||b===undefined) ? '—' : String(b);
  const lines = [
    `*Tutory English — Virtual Fair Mock Test Result*`,
    ``,
    `Hi ${student.name},`,
    `Here's the result of your mock test${student.setTitle?' ('+student.setTitle+')':''} on ${dateTaken}:`,
    ``,
    `📘 *Listening: ${fmt(effLBand)}* (${cefrFromBand(effLBand)})`,
    ...(g.listeningComment ? [g.listeningComment, ``] : [``]),
    `📗 *Reading: ${fmt(effRBand)}* (${cefrFromBand(effRBand)})`,
    ...(g.readingComment ? [g.readingComment, ``] : [``]),
    `📝 *Writing: ${fmt(wOverall)}* (${cefrFromBand(wOverall)})`,
    ...(g.writingComment ? [g.writingComment, ``] : [``]),
    `🗣️ *Speaking: ${fmt(sBand)}* (${cefrFromBand(sBand)})`,
    ...(g.speakingComment ? [g.speakingComment, ``] : [``]),
    `⭐ *Overall Band Score: ${fmt(overallScore)}* (${cefrFromBand(overallScore)})`,
    ``,
    ...(g.notes ? [`Notes from the teacher:`, g.notes, ``] : []),
    `Thank you for joining the Tutory 2026 Virtual Fair! 🎉`
  ];
  return lines.join('\n').trim();
}
function sendReportWA(){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  const digits = sanitizePhoneForWA(student.phone);
  if(!digits){
    alert('No WhatsApp number on file for this student yet. Fill in the "WhatsApp Number" field above (in the report) first.');
    return;
  }
  const text = buildReportWAText(student);
  window.open(`https://wa.me/${digits}?text=${encodeURIComponent(text)}`, '_blank');
  student.grading.reportSent = true;
  student.grading.reportSentAt = Date.now();
  saveState();
  syncStudentNow(student.email);
  render();
}
function printReport(){
  window.print();
}
function adminLockGrading(){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  if(!confirm('Lock this result? Scores, comments, and notes will become read-only until you click "Edit Result" again.')) return;
  student.grading.locked = true;
  saveState();
  syncStudentNow(student.email);
  render();
}
function adminUnlockGrading(){
  const student = getStudent(state.adminReviewingEmail);
  if(!student) return;
  student.grading.locked = false;
  saveState();
  syncStudentNow(student.email);
  render();
}

function renderCriterionRow(criterion, value, changeHandler, locked){
  const nar = criterionNarrative(criterion, value);
  return `
  <div class="rubric-row">
    <div class="row" style="justify-content:space-between;align-items:center;flex-wrap:nowrap;gap:10px;">
      <label style="font-weight:700;font-size:13.5px;">${esc(criterion.label)}</label>
      ${locked
        ? `<span style="flex:0 0 150px;text-align:right;font-weight:700;">${value?esc(value):'—'}</span>`
        : `<span class="no-print" style="flex:0 0 150px;"><select onchange="${changeHandler}">${bandOptionsHTML(criterion, value)}</select></span>`}
    </div>
    ${nar
      ? `<p class="rubric-narrative">In <strong>${esc(criterion.label)}</strong>, you have ${esc(nar.have)}. ${nar.grow ? 'You can work on: '+esc(nar.grow)+'.' : 'You have reached the top band for this criterion — keep up the consistency!'}</p>`
      : `<p class="muted no-print" style="font-size:12px;">Not yet scored.</p>`}
  </div>`;
}

function renderWritingGradingBlock(student, task, locked){
  const wsec = student.sections.writing;
  const g = student.grading.writing;
  const rawText = wsec.answers[task] || '';
  const comments = g.comments[task];
  const taskLabel = task==='task1' ? 'Task 1' : 'Task 2';
  const band = computeTaskBand(g.criteria[task]);
  // This entire block is a teacher-only scoring workspace (no-print) — it's
  // used to work out the Writing band but is never shown to the student.
  // The single overall Writing comment (rendered separately, below both
  // tasks) is the only Writing feedback that appears on the printed report.
  return `
  <div class="no-print" style="margin-bottom:24px;border:1px dashed var(--border);border-radius:10px;padding:14px;">
    <h4 style="margin-top:0;">Writing ${taskLabel} — scoring workspace ${band!==null ? `<span class="pill pill-progress" style="margin-left:6px;">Band ${band}</span>` : ''}</h4>
    <p class="muted" style="font-size:12px;">Teacher-only, for working out the band — not shown on the student's report. Only the overall Writing comment below is.</p>
    ${locked ? '' : `
    <label style="font-weight:600;font-size:12.5px;display:block;margin-bottom:4px;">Essay text${rawText?'':' — not recorded, type or paste it in manually'}</label>
    <textarea rows="6" style="margin-bottom:8px;" placeholder="Paste or type the student's ${taskLabel} answer here if it wasn't recorded..." oninput="setManualWritingText('${task}', this.value)">${esc(rawText)}</textarea>
    <p class="muted" style="font-size:12.5px;">Select part of the text below, then click "+ Add Comment".</p>`}
    <div id="writingText-${task}" style="border:1px solid var(--border);border-radius:10px;padding:14px;font-size:14px;line-height:1.7;white-space:pre-line;margin-bottom:8px;">${buildHighlightedHTML(rawText, comments)}</div>
    ${locked ? '' : `<button class="btn-outline btn-sm" onclick="addWritingComment('${task}')">+ Add Comment on Selected Text</button>`}
    ${comments.length ? `
      <div style="margin-top:10px;">
        ${comments.map((c,i)=>`
          <div style="background:var(--brand-light);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px;">
            <strong>#${i+1}</strong> "${esc(c.quote)}" — ${esc(c.comment)}
            ${locked ? '' : `<button style="background:none;color:var(--danger);float:right;font-size:12px;" onclick="removeWritingComment('${task}',${i})">Delete</button>`}
          </div>`).join('')}
      </div>` : ''}
    <div style="margin-top:14px;">
      ${WRITING_CRITERIA.map(c=>renderCriterionRow(c, student.grading.writing.criteria[task][c.key], `setWritingCriteria('${task}','${c.key}', this.value)`, locked)).join('')}
    </div>
  </div>`;
}

function renderGradingPage(student){
  const lGrade = gradeListening(student.sections.listening);
  const rGrade = gradeReading(student.sections.reading);
  const lBand = rawScoreToBand(lGrade.correct);
  const rBand = rawScoreToBand(rGrade.correct);
  const g = student.grading;
  // Manual override wins over the auto-computed band whenever it's set —
  // see setListeningOverride/setReadingOverride above.
  const lOverridden = g.listeningOverride!=null;
  const rOverridden = g.readingOverride!=null;
  const effLBand = lOverridden ? g.listeningOverride : lBand;
  const effRBand = rOverridden ? g.readingOverride : rBand;
  const wOverall = computeOverallWritingBand(g.writing.criteria.task1, g.writing.criteria.task2);
  const sBand = computeSpeakingBand(g.speaking.criteria);
  const overallScore = computeOverallScore(effLBand, effRBand, wOverall, sBand);
  const dateSource = student.sections.listening.startTime || student.loginTime;
  const dateTaken = new Date(dateSource).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const locked = !!g.locked;

  return `
  <div class="no-print" style="margin-bottom:14px;">
    <button class="btn-outline" onclick="closeGrading()">← Back to Dashboard</button>
  </div>

  <div class="card" id="reportRoot">
    <div class="report-header">
      <div class="report-logo"><img src="${TUTORY_LOGO_DATAURL}" alt="Tutory English"></div>
      <div>
        <div class="report-brand">Tutory English</div>
        <div class="report-subtitle">Virtual Fair Mock Up Test Result</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:6px;align-items:center;">
        ${locked ? `<span class="pill pill-submitted no-print">🔒 Locked</span>` : `<span class="pill pill-progress no-print">✏️ Editable</span>`}
        ${g.reportSent ? `<span class="pill pill-submitted no-print">✓ Sent ${new Date(g.reportSentAt).toLocaleString()}</span>` : `<span class="pill pill-pending no-print">Not sent yet</span>`}
      </div>
    </div>
    <hr>

    <div class="report-meta">
      <div><span class="lbl3">Name</span><div class="val3">${esc(student.name)}</div></div>
      <div><span class="lbl3">Date Taken</span><div class="val3">${dateTaken}</div></div>
      <div><span class="lbl3">Email</span><div class="val3">${esc(student.email)}</div></div>
      <div><span class="lbl3">Test Set</span><div class="val3">${student.setTitle ? esc(student.setTitle) : '—'}</div></div>
      <div>
        <span class="lbl3">WhatsApp Number</span>
        ${locked
          ? `<div class="val3">${student.phone ? esc(student.phone) : '—'}</div>`
          : `<input class="no-print" style="width:100%;" placeholder="e.g. 0812xxxxxxx" value="${esc(student.phone||'')}" onchange="setStudentPhone(this.value)">`}
      </div>
    </div>

    <hr>
    <h3>Result</h3>
    <div class="score-grid">
      <div class="score-box">
        <div class="band">${effLBand}</div>
        <span class="cefr">${cefrFromBand(effLBand)}</span><div class="lbl2">Listening</div>
        ${locked ? '' : `<select class="no-print" style="margin-top:6px;font-size:11px;width:100%;" onchange="setListeningOverride(this.value)">${bandOverrideOptionsHTML(g.listeningOverride)}</select>`}
      </div>
      <div class="score-box">
        <div class="band">${effRBand}</div>
        <span class="cefr">${cefrFromBand(effRBand)}</span><div class="lbl2">Reading</div>
        ${locked ? '' : `<select class="no-print" style="margin-top:6px;font-size:11px;width:100%;" onchange="setReadingOverride(this.value)">${bandOverrideOptionsHTML(g.readingOverride)}</select>`}
      </div>
      <div class="score-box"><div class="band">${wOverall!==null?wOverall:'—'}</div><span class="cefr">${cefrFromBand(wOverall)}</span><div class="lbl2">Writing</div></div>
      <div class="score-box"><div class="band">${sBand!==null?sBand:'—'}</div><span class="cefr">${cefrFromBand(sBand)}</span><div class="lbl2">Speaking</div></div>
      <div class="score-box score-box-overall"><div class="band">${overallScore!==null?overallScore:'—'}</div><span class="cefr">${cefrFromBand(overallScore)}</span><div class="lbl2">Overall Band Score</div></div>
    </div>
    ${overallScore===null ? `<p class="muted no-print" style="font-size:12px;margin-top:8px;">Overall Band Score will appear once all Writing &amp; Speaking criteria are scored.</p>` : ''}
    <p class="muted" style="font-size:11.5px;margin-top:8px;">*Band scores are indicative, converted from the raw-score table / teacher rubric — they may differ from an official IELTS band score.</p>

    <hr>
    <h3>Listening — Comment</h3>
    ${locked
      ? (g.listeningComment ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.listeningComment)}</p>` : `<p class="muted" style="font-size:13px;">No comment yet.</p>`)
      : `<textarea class="no-print" rows="3" placeholder="Comment on the student's Listening performance..." oninput="setListeningComment(this.value)">${esc(g.listeningComment||'')}</textarea>
         ${g.listeningComment ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.listeningComment)}</p>` : ''}`}

    <hr>
    <h3>Reading — Comment</h3>
    ${locked
      ? (g.readingComment ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.readingComment)}</p>` : `<p class="muted" style="font-size:13px;">No comment yet.</p>`)
      : `<textarea class="no-print" rows="3" placeholder="Comment on the student's Reading performance..." oninput="setReadingComment(this.value)">${esc(g.readingComment||'')}</textarea>
         ${g.readingComment ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.readingComment)}</p>` : ''}`}

    <hr>
    <h3>Writing — Comment</h3>
    ${locked
      ? (g.writingComment ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.writingComment)}</p>` : `<p class="muted" style="font-size:13px;">No comment yet.</p>`)
      : `<textarea class="no-print" rows="3" placeholder="Overall comment on the student's Writing (Task 1 &amp; Task 2)..." oninput="setWritingComment(this.value)">${esc(g.writingComment||'')}</textarea>
         ${g.writingComment ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.writingComment)}</p>` : ''}`}
    ${renderWritingGradingBlock(student,'task1',locked)}
    ${renderWritingGradingBlock(student,'task2',locked)}

    <hr>
    <h3>Speaking — Comment</h3>
    <p class="muted no-print" style="font-size:12.5px;">Speaking is assessed manually by the teacher (no recorded speaking submission in this system).</p>
    <div class="no-print" style="border:1px dashed var(--border);border-radius:10px;padding:14px;margin-bottom:10px;">
      <p class="muted" style="font-size:12px;margin-top:0;">Teacher-only, for working out the band — not shown on the student's report.</p>
      ${SPEAKING_CRITERIA.map(c=>renderCriterionRow(c, g.speaking.criteria[c.key], `setSpeakingCriteria('${c.key}', this.value)`, locked)).join('')}
    </div>
    ${locked
      ? (g.speakingComment ? `<p style="font-size:13.5px;line-height:1.6;margin-top:10px;">${esc(g.speakingComment)}</p>` : `<p class="muted" style="font-size:13px;">No comment yet.</p>`)
      : `<textarea class="no-print" rows="3" style="margin-top:10px;" placeholder="Comment on the student's Speaking performance..." oninput="setSpeakingComment(this.value)">${esc(g.speakingComment||'')}</textarea>
         ${g.speakingComment ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.speakingComment)}</p>` : ''}`}

    <hr>
    <h3>Additional Notes</h3>
    ${locked
      ? (g.notes ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.notes)}</p>` : `<p class="muted" style="font-size:13px;">No additional notes.</p>`)
      : `<textarea class="no-print" rows="4" placeholder="Additional notes from the teacher..." oninput="setGradingNotes(this.value)">${esc(g.notes)}</textarea>
         ${g.notes ? `<p style="font-size:13.5px;line-height:1.6;">${esc(g.notes)}</p>` : ''}`}

    <div class="signature-row">
      <div class="signature-block">
        <p class="muted" style="margin-bottom:10px;">Assessed by,</p>
        <img class="signature-img" src="${TUTORY_SIGNATURE_DATAURL}" alt="El Sheren Elieswati signature">
        <p class="muted" style="margin:0;font-size:13px;">Director of Tutory English</p>
      </div>
      <div class="stamp">${TUTORY_STAMP_SVG}</div>
    </div>
  </div>

  <div class="no-print row" style="margin-top:16px;">
    ${locked
      ? `<button class="btn-secondary" onclick="adminUnlockGrading()">✏️ Edit Result</button>`
      : `<button class="btn-primary" onclick="adminLockGrading()">🔒 Save &amp; Lock Result</button>`}
    <button class="btn-outline" onclick="printReport()">🖨️ Print / Save as PDF</button>
    <button class="btn-primary" id="sendReportBtn" onclick="sendReportWA()">📱 Send via WhatsApp</button>
  </div>
  `;
}

   INIT
